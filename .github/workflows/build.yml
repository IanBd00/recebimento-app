name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Instala Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Instala Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'

      - name: Instala dependências
        run: flutter pub get

      - name: Gera APK
        run: flutter build apk --release --no-shrink

      - name: Renomeia APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/trynt.apk

      - name: Sobe APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: trynt-estoque-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/trynt.apk
          retention-days: 30

      - name: Envia para Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: equipe-trynt
          file: build/app/outputs/flutter-apk/trynt.apk
          releaseNotes: "Build automático #${{ github.run_number }}"